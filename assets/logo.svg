<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 256 256"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">VRChat MCP logo</title>
  <desc id="desc">Two nested speech bubbles inside a dark rounded app tile.</desc>
  <defs>
    <linearGradient id="tile-bg" x1="128" y1="0" x2="128" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#171b2f" />
      <stop offset="0.58" stop-color="#101628" />
      <stop offset="1" stop-color="#0b1020" />
    </linearGradient>
    <linearGradient
      id="tile-border"
      x1="26"
      y1="18"
      x2="230"
      y2="238"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#fff8ed" stop-opacity="0.52" />
      <stop offset="0.48" stop-color="#6f8fd0" stop-opacity="0.5" />
      <stop offset="1" stop-color="#2c355a" stop-opacity="0.64" />
    </linearGradient>
    <filter
      id="soft-shadow"
      x="-20%"
      y="-20%"
      width="140%"
      height="150%"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.42" />
    </filter>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#tile-border)" />
  <rect x="2" y="2" width="252" height="252" rx="54" fill="url(#tile-bg)" />
  <g transform="translate(0 8)">
    <path
      d="M34 66c0-25.4 20.6-46 46-46h96c25.4 0 46 20.6 46 46v78c0 25.4-20.6 46-46 46h-36.8l-50.4 36.3c-9.2 6.6-22.1 0-22.1-11.3v-29.8C47.4 177.4 34 161.8 34 143.6V66Z"
      fill="#f6efe6"
      filter="url(#soft-shadow)"
    />
    <path
      d="M78 58h94c11.6 0 21 9.4 21 21v50c0 11.6-9.4 21-21 21h-37.6L106 170.5c-4.8 3.5-11.6.1-11.6-5.9V150H78c-11.6 0-21-9.4-21-21V79c0-11.6 9.4-21 21-21Z"
      fill="#4f6fa8"
    />
    <path
      d="M100 85h64M100 108h52M100 131h34"
      fill="none"
      stroke="#fff8ed"
      stroke-width="9"
      stroke-linecap="round"
    />
  </g>
</svg>
