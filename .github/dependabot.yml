version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: deps
      prefix-development: deps-dev
      include: scope
    groups:
      npm-production:
        dependency-type: production
        patterns:
          - '*'
      npm-development:
        dependency-type: development
        patterns:
          - '*'
      npm-security:
        applies-to: security-updates
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: deps
      include: scope
    groups:
      github-actions:
        patterns:
          - '*'
      github-actions-security:
        applies-to: security-updates
        patterns:
          - '*'
