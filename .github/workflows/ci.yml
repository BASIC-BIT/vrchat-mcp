name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - run: npm ci

      - name: Download VRChat OpenAPI spec
        run: |
          mkdir -p specs
          curl -fsSL "https://vrchat.community/openapi.yaml" -o specs/vrchat-openapi.yaml

      - run: npm run check

      # Metrics gates (redundant complexity heuristics).
      - name: Install lizard
        run: python -m pip install --upgrade pip && python -m pip install "lizard==1.21.0"
      - name: Install scc
        run: |
          go install github.com/boyter/scc/v3@v3.6.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: npm run metrics
