name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - run: npm ci
      - run: npm run check

      # Metrics gates (redundant complexity heuristics).
      - name: Install lizard
        run: python -m pip install --upgrade pip && python -m pip install "lizard==1.21.0"
      - name: Install scc
        run: |
          go install github.com/boyter/scc/v3@v3.6.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: npm run metrics
