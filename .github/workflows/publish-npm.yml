name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish, for retrying an existing release.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Validate release tag
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"
          actual_tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}"

          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Release tag $actual_tag does not match package version $package_version; expected $expected_tag." >&2
            exit 1
          fi

      - run: npm run release:verify

      - run: npm publish --access public --provenance
