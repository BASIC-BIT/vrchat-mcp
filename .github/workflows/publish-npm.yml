name: Publish release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish, for retrying an existing release.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Validate release tag
        id: release
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"
          actual_tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}"

          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Release tag $actual_tag does not match package version $package_version; expected $expected_tag." >&2
            exit 1
          fi

          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Check npm package version
        id: npm
        env:
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
        run: |
          if npm view "@basicbit/vrchat-mcp@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "@basicbit/vrchat-mcp@${PACKAGE_VERSION} is already published."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm run release:verify

      - if: steps.npm.outputs.exists != 'true'
        run: npm publish --access public --provenance

      - name: Install MCP publisher
        run: |
          publisher_version="1.7.9"
          archive="mcp-publisher_linux_amd64.tar.gz"
          checksums="registry_${publisher_version}_checksums.txt"
          base_url="https://github.com/modelcontextprotocol/registry/releases/download/v${publisher_version}"

          curl -fsSLO "${base_url}/${archive}"
          curl -fsSLO "${base_url}/${checksums}"
          grep "  ${archive}$" "${checksums}" | sha256sum -c -
          tar -xzf "${archive}"

      - name: Publish MCP Registry metadata
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher validate
          ./mcp-publisher publish
